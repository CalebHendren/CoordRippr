name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
      - run: npm test

  build:
    name: Package (${{ matrix.name }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-exe
            os: windows-latest
            args: --win nsis
          - name: macos-dmg
            os: macos-latest
            args: --mac dmg --x64 --arm64
          - name: linux-ubuntu-fedora-arch
            os: ubuntu-latest
            args: --linux deb rpm pacman
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install Linux packaging tools (rpm, pacman)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y rpm libarchive-tools
      - run: npm ci
      - name: Build distributables
        run: npx electron-builder ${{ matrix.args }} --publish never
        env:
          # No code-signing certificates in CI; build unsigned.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.deb
            dist/*.rpm
            dist/*.pacman
          if-no-files-found: error

  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
